services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3001}
      DB_DIR: ${DB_DIR:-/app/db}
      DATA_DIR: ${DATA_DIR:-/app/data}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./db:${DB_DIR:-/app/db}
      - ./data:${DATA_DIR:-/app/data}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  telegram_bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_API_BASE_URL: ${BOT_INTERNAL_API_BASE_URL:-http://api:3001}
      TEST_YOOKASSA_TOKEN: ${TEST_YOOKASSA_TOKEN}
      TEST_YOOKASSA_SHOP_ID: ${TEST_YOOKASSA_SHOP_ID}
      TEST_YOOKASSA_SECRET_KEY: ${TEST_YOOKASSA_SECRET_KEY}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mini_app:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${MINI_APP_API_BASE_URL:-/api}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MINI_APP_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  admin_panel:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_PANEL_API_BASE_URL:-/api}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${ADMIN_PANEL_PORT:-3002}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  landing_site:
    build:
      context: .
      dockerfile: docker/landing.Dockerfile
      args:
        LANDING_BRAND_NAME: ${LANDING_BRAND_NAME:-Bashlarova Tests}
        LANDING_DOMAIN: ${LANDING_DOMAIN:-bashlarovatests.ru}
        LANDING_BOT_URL: ${LANDING_BOT_URL:-https://t.me/bashlarovatests_bot}
        LANDING_CONTACT_EMAIL: ${LANDING_CONTACT_EMAIL:-support@bashlarovatests.ru}
        LANDING_CONTACT_TELEGRAM: ${LANDING_CONTACT_TELEGRAM:-@bashlarova_support}
        LANDING_CONTACT_PHONE: ${LANDING_CONTACT_PHONE:-+7 (900) 000-00-00}
        LANDING_SELLER_NAME: ${LANDING_SELLER_NAME:-ИП Фамилия Имя Отчество}
        LANDING_SELLER_INN: ${LANDING_SELLER_INN:-000000000000}
        LANDING_SELLER_OGRNIP: ${LANDING_SELLER_OGRNIP:-000000000000000}
        LANDING_SELLER_CITY: ${LANDING_SELLER_CITY:-г. Москва}
    ports:
      - "${LANDING_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
